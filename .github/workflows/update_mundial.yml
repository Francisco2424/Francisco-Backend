name: Actualizar datos del Mundial

on:
  schedule:
    - cron: "0 */6 * * *"   # Cada 6 horas
  workflow_dispatch:        # Permite ejecutarlo manualmente si quieres
jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependencias
        run: |
          pip install requests

      - name: Ejecutar script de actualización
        run: |
         python mundial_updater/update_mundial.py

      - name: Commit y push de los JSON actualizados
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add backend/data/mundial/*.json
          git commit -m "Actualización automática de datos del Mundial" || echo "No hay cambios"
          git push
